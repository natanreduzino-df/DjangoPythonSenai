<div class="article-card" onclick="location.href='{% url 'artigo' artigo.id %}'" style="cursor: pointer; width: 100%;">
    <div class="card-body-custom">
        <div class="card-meta mb-2">
            <span class="badge" style="background-color: var(--primary-accent); color: white;">{{ artigo.eixo.nome }}</span>
            <span class="text-muted small ms-2">
                <i class="bi bi-calendar3" style="color: var(--primary-accent);"></i> {{ artigo.data_publicacao|date:"d/m/Y" }}
            </span>
        </div>
        <h4 class="card-title-custom text-white fw-bold">{{ artigo.texto|striptags|safe|truncatechars:45 }}</h4>
        <p class="card-preview-text text-muted small mt-2">
            {{ artigo.texto|striptags|safe|truncatechars:90 }}
        </p>
        <div class="card-footer-custom d-flex justify-content-between align-items-center mt-3 pt-2" style="border-top: 1px solid var(--border-color);">
            <div class="author-info d-flex align-items-center gap-2">
                <div class="author-avatar-sm d-flex align-items-center justify-content-center text-white fw-bold small" style="width: 28px; height: 28px; background-color: var(--primary-accent); border-radius: 50%; font-size: 11px;">
                    {{ artigo.autor.nome|slice:":2"|upper }}
                </div>
                <span class="author-name-sm text-white small fw-semibold">{{ artigo.autor.nome }}</span>
            </div>
            <a href="{% url 'artigo' artigo.id %}" class="read-more-link text-decoration-none small" style="color: var(--primary-accent); font-weight: 700;">
                Ler mais <i class="bi bi-arrow-right"></i>
            </a>
        </div>
    </div>
</div>
