<style>
    .custon-navbar {
        background-color: var(--bg-dark) !important;
        border-bottom: 1px solid var(--border-color);
    }

    .nav-search-wrapper {
        position: relative;
        max-width: 240px;
        width: 100%;
    }

    .nav-search-input {
        background-color: #0b0f19;
        border: 1px solid var(--border-color);
        border-radius: 6px;
        color: var(--text-main);
        padding: 0.4rem 0.75rem 0.4rem 2rem;
        font-size: 0.85rem;
        width: 100%;
        transition: all 0.2s ease;
    }

    .nav-search-input:focus {
        border-color: var(--primary-accent);
        outline: none;
        box-shadow: 0 0 0 2px rgba(81, 100, 158, 0.2);
    }

    .nav-search-icon {
        position: absolute;
        left: 0.75rem;
        top: 50%;
        transform: translateY(-50%);
        color: var(--text-muted);
        font-size: 0.85rem;
    }
</style>

<nav class="navbar custon-navbar py-3">
    <div class="container d-flex justify-content-between align-items-center">
        <div class="d-flex align-items-center gap-4">
            <a class="navbar-brand fw-bold fs-5 text-white text-decoration-none m-0" href="{% url 'home' %}">
                <i class="bi bi-terminal-fill me-2" style="color: var(--primary-accent);"></i>
                Artigos Blog <span style="color: var(--primary-accent);">Django</span>
            </a>
            
            <a href="{% url 'home' %}" class="text-decoration-none fw-semibold small" style="color: var(--primary-accent) !important; transition: color 0.2s;">
                Artigos
            </a>
        </div>
        
        <form method="GET" action="{% url 'home' %}" class="nav-search-wrapper">
            <i class="bi bi-search nav-search-icon"></i>
            <input type="text" name="busca" class="nav-search-input" placeholder="Buscar..." value="{{ request.GET.busca }}">
            {% if request.GET.eixo %}
                <input type="hidden" name="eixo" value="{{ request.GET.eixo }}">
            {% endif %}
        </form>
    </div>
</nav>
