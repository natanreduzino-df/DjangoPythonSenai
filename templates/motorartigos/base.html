{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog Artigos Django</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-darkest: #0b0f19;      
            --bg-dark: #121824;         
            --bg-card: #161f30;         
            --border-color: #1e293b;    
            --text-main: #ffffff;       
            --text-muted: #94a3b8;      
            --primary-accent: #6366f1;  
            --secondary-accent: #38bdf8;
            --accent-green: #34d399;    
        }

        body {
            background-color: var(--bg-darkest);
            color: var(--text-main);
            font-family: 'Plus Jakarta Sans', sans-serif;
            overflow-x: hidden;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .custon-navbar {
            background-color: var(--bg-dark) !important;
            border-bottom: 1px solid var(--border-color);
        }

        .nav-search-wrapper {
            position: relative;
            max-width: 240px;
            width: 100%;
        }
        .nav-search-input {
            background-color: #0b0f19;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            color: var(--text-main);
            padding: 0.4rem 0.75rem 0.4rem 2rem;
            font-size: 0.85rem;
            width: 100%;
            transition: all 0.2s ease;
        }
        .nav-search-input:focus {
            border-color: var(--primary-accent);
            outline: none;
            box-shadow: 0 0 0 2px rgba(99, 102, 241, 0.2);
        }
        .nav-search-icon {
            position: absolute;
            left: 0.75rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 0.85rem;
        }

        .modern-tabs {
            display: flex;
            gap: 2rem;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 0px;
            margin-bottom: 3rem;
        }
        .tab-link {
            color: var(--text-muted);
            text-decoration: none;
            font-weight: 600;
            font-size: 0.95rem;
            padding-bottom: 0.75rem;
            position: relative;
            transition: color 0.2s ease;
        }
        .tab-link:hover {
            color: var(--text-main);
        }
        .tab-link.active {
            color: var(--primary-accent);
        }
        .tab-link.active::after {
            content: '';
            position: absolute;
            left: 0;
            bottom: -1px;
            width: 100%;
            height: 2px;
            background-color: var(--primary-accent);
        }

        .article-card {
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            transition: border-color 0.2s ease, transform 0.2s ease;
        }
        .article-card:hover {
            border-color: var(--primary-accent);
            transform: translateY(-2px);
        }

        .card-title-custom {
            color: var(--text-main) !important;
        }

        .custom-footer {
            background-color: var(--bg-dark);
            border-top: 1px solid var(--border-color);
            color: var(--text-muted);
        }
        .custom-footer p {
            color: var(--text-main) !important;
        }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-darkest); }
        ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 4px; }
        
        .card-img-wrapper { position: relative; overflow: hidden; aspect-ratio: 16/10; border-bottom: 1px solid var(--border-color); border-radius: 12px 12px 0 0; }
        .card-img-custom { width: 100%; height: 100%; object-fit: cover; }
        .badge-level { position: absolute; top: 1rem; right: 1rem; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; padding: 0.35rem 0.75rem; border-radius: 6px; }
        .level-b { background-color: var(--accent-green); color: #000; }
        
        .card-body-custom { padding: 1.5rem; display: flex; flex-direction: column; flex-grow: 1; }
        .card-meta { font-size: 0.8rem; color: var(--text-muted); font-weight: 600; margin-bottom: 0.75rem; display: flex; align-items: center; gap: 12px; }
        .card-meta i { color: var(--primary-accent); }
        .card-preview-text { font-size: 0.9rem; color: var(--text-muted); line-height: 1.5; margin-bottom: 1.5rem; }
        .card-footer-custom { margin-top: auto; display: flex; justify-content: space-between; align-items: center; padding-top: 1rem; border-top: 1px solid var(--border-color); }
        .author-info { display: flex; align-items: center; gap: 8px; }
        .author-avatar-sm { width: 24px; height: 24px; border-radius: 50%; background-color: var(--primary-accent); color: #ffffff; font-weight: 700; font-size: 0.7rem; display: flex; align-items: center; justify-content: center; text-transform: uppercase; }
        .author-name-sm { font-size: 0.8rem; font-weight: 600; color: var(--text-main); }
        .read-more-link { font-size: 0.85rem; font-weight: 700; color: var(--primary-accent); text-decoration: none; display: flex; align-items: center; gap: 4px; }
        
        .section-title { font-size: 1.4rem; font-weight: 700; margin-bottom: 1.5rem; color: var(--text-main); }
        
        .btn-back { background-color: var(--bg-dark); color: var(--text-main); border: 1px solid var(--border-color); border-radius: 8px; padding: 0.6rem 1.2rem; font-weight: 600; font-size: 0.9rem; text-decoration: none; margin-bottom: 2rem; display: inline-flex; align-items: center; gap: 8px; }
        .btn-back:hover { border-color: var(--primary-accent); color: var(--primary-accent); }
        .detail-header-meta { display: flex; flex-wrap: wrap; gap: 1rem; align-items: center; margin-bottom: 1rem; }
        .detail-axis-badge { background-color: rgba(99, 102, 241, 0.1); color: var(--primary-accent); border: 1px solid var(--primary-accent); padding: 0.4rem 1rem; border-radius: 6px; font-weight: 600; font-size: 0.85rem; }
        .detail-title { font-size: 2.2rem; font-weight: 800; line-height: 1.3; letter-spacing: -0.5px; margin-bottom: 1.5rem; color: var(--text-main); }
        .detail-content-area { font-size: 1.05rem; line-height: 1.8; color: #cbd5e1; } 
        
        .author-card-large { background-color: var(--bg-dark); border: 1px solid var(--border-color); border-radius: 12px; padding: 2rem; margin-top: 4rem; display: flex; gap: 1.5rem; align-items: center; }
        .author-avatar-lg { width: 60px; height: 60px; border-radius: 50%; background: var(--primary-accent); color: #ffffff; font-weight: 800; font-size: 1.5rem; display: flex; align-items: center; justify-content: center; flex-shrink: 0; text-transform: uppercase; }
        .author-contact-btn { background-color: var(--bg-darkest); color: var(--text-main); border: 1px solid var(--border-color); border-radius: 6px; padding: 0.4rem 1rem; font-size: 0.85rem; font-weight: 600; text-decoration: none; display: inline-flex; align-items: center; gap: 8px; margin-top: 0.75rem; }
        .author-contact-btn:hover { border-color: var(--primary-accent); color: var(--primary-accent); }
    </style>
</head>
<body>

    <nav class="navbar custon-navbar py-3">
        <div class="container d-flex justify-content-between align-items-center">
            <div class="d-flex align-items-center gap-4">
                <a class="navbar-brand fw-bold fs-5 text-white text-decoration-none m-0" href="{% url 'index' %}">
                    <i class="bi bi-terminal text-primary me-2"></i>
                    DevBlog <span style="color: var(--primary-accent);">Django</span>
                </a>
                
                <a href="{% url 'index' %}" class="text-white text-decoration-none fw-semibold small text-primary" style="transition: color 0.2s;">
                    Artigos
                </a>
            </div>
            
            <form method="GET" action="{% url 'index' %}" class="nav-search-wrapper">
                <i class="bi bi-search nav-search-icon"></i>
                <input type="text" name="busca" class="nav-search-input" placeholder="Buscar..." value="{{ request.GET.busca }}">
                {% if request.GET.eixo %}
                    <input type="hidden" name="eixo" value="{{ request.GET.eixo }}">
                {% endif %}
            </form>
        </div>
    </nav>
    
    <main class="container my-5 flex-grow-1"> 
        {% block content %}
        {% endblock %}
    </main>

    {% include 'motorartigos/partials/_footer.html' %}

</body>
</html>
