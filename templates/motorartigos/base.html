{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Artigos Blog Django</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-darkest: #0b0f19;      
            --bg-dark: #121824;         
            --bg-card: #161f30;         
            --border-color: #1e293b;    
            --text-main: #ffffff;       
            --text-muted: #b9babd;      
            --primary-accent: #51649e;  
            --secondary-accent: #b9babd;
            --accent-green: #34d399;    
        }

        body {
            background-color: var(--bg-darkest);
            color: var(--text-main);
            font-family: 'Plus Jakarta Sans', sans-serif;
            overflow-x: hidden;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .custon-navbar {
            background-color: var(--bg-dark) !important;
            border-bottom: 1px solid var(--border-color);
        }

        .nav-link-custom {
            color: var(--text-muted) !important;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
            transition: all 0.2s ease-in-out;
            padding: 0.25rem 0.75rem;
            border-radius: 6px;
        }

        .nav-link-custom:hover {
            color: var(--text-main) !important;
            background-color: rgba(255, 255, 255, 0.05);
        }

        .nav-link-custom.active {
            color: var(--text-main) !important;
            background-color: rgba(81, 100, 158, 0.15);
            border: 1px solid rgba(81, 100, 158, 0.3);
        }

        .nav-search-wrapper {
            position: relative;
            max-width: 220px;
            width: 100%;
        }
        .nav-search-input {
            background-color: #0b0f19;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            color: var(--text-main);
            padding: 0.4rem 0.75rem 0.4rem 2rem;
            font-size: 0.85rem;
            width: 100%;
            transition: all 0.2s ease;
        }
        .nav-search-input:focus {
            border-color: var(--primary-accent);
            outline: none;
            box-shadow: 0 0 0 2px rgba(81, 100, 158, 0.2);
        }
        .nav-search-icon {
            position: absolute;
            left: 0.75rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 0.85rem;
        }

        .modern-tabs {
            display: flex;
            gap: 2rem;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 0px;
            margin-bottom: 3rem;
        }
        .tab-link {
            color: var(--text-muted);
            text-decoration: none;
            font-weight: 600;
            font-size: 0.95rem;
            padding-bottom: 0.75rem;
            position: relative;
            transition: color 0.2s ease;
        }
        .tab-link:hover {
            color: var(--text-main);
        }
        .tab-link.active {
            color: var(--primary-accent);
        }
        .tab-link.active::after {
            content: '';
            position: absolute;
            left: 0;
            bottom: -1px;
            width: 100%;
            height: 2px;
            background-color: var(--primary-accent);
        }

        .article-card {
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            transition: border-color 0.2s ease, transform 0.2s ease;
        }
        .article-card:hover {
            border-color: var(--primary-accent);
            transform: translateY(-2px);
        }

        .card-title-custom {
            color: var(--text-main) !important;
        }

        .custom-footer {
            background-color: var(--bg-dark);
            border-top: 1px solid var(--border-color);
            color: var(--text-muted);
        }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-darkest); }
        ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 4px; }
        
        .card-img-wrapper { position: relative; overflow: hidden; aspect-ratio: 16/10; border-bottom: 1px solid var(--border-color); border-radius: 12px 12px 0 0; }
        .card-img-custom { width: 100%; height: 100%; object-fit: cover; }
        
        .card-body-custom { padding: 1.5rem; display: flex; flex-direction: column; flex-grow: 1; }
        .card-meta { font-size: 0.8rem; color: var(--text-muted); font-weight: 600; margin-bottom: 0.75rem; display: flex; align-items: center; gap: 12px; }
        .card-meta i { color: var(--primary-accent); }
        .card-preview-text { font-size: 0.9rem; color: var(--text-muted); line-height: 1.5; margin-bottom: 1.5rem; }
        .card-footer-custom { margin-top: auto; display: flex; justify-content: space-between; align-items: center; padding-top: 1rem; border-top: 1px solid var(--border-color); }
        .author-info { display: flex; align-items: center; gap: 8px; }
        .author-avatar-sm { width: 24px; height: 24px; border-radius: 50%; background-color: var(--primary-accent); color: #ffffff; font-weight: 700; font-size: 0.7rem; display: flex; align-items: center; justify-content: center; text-transform: uppercase; }
        .author-name-sm { font-size: 0.8rem; font-weight: 600; color: var(--text-main); }
        .read-more-link { font-size: 0.85rem; font-weight: 700; color: var(--primary-accent); text-decoration: none; display: flex; align-items: center; gap: 4px; }
        
        .btn-back { background-color: var(--bg-dark); color: var(--text-main); border: 1px solid var(--border-color); border-radius: 8px; padding: 0.6rem 1.2rem; font-weight: 600; font-size: 0.9rem; text-decoration: none; margin-bottom: 2rem; display: inline-flex; align-items: center; gap: 8px; }
        .btn-back:hover { border-color: var(--primary-accent); color: var(--primary-accent); }
    </style>
</head>
<body>

    <nav class="navbar custon-navbar py-3">
        <div class="container d-flex justify-content-between align-items-center">
            
            <!-- Logo (Esquerda) -->
            <a class="navbar-brand fw-bold fs-5 text-white text-decoration-none m-0 d-flex align-items-center" href="{% url 'home' %}">
                <i class="bi bi-terminal-fill me-2" style="color: var(--primary-accent);"></i>
                Artigos Blog <span style="color: var(--primary-accent); margin-left: 5px;">Django</span>
            </a>
            
            <!-- Links Centralizados (Centro) -->
            <div class="d-none d-lg-flex align-items-center gap-2 mx-auto">
                <a href="{% url 'home' %}" class="nav-link-custom {% if not request.GET.eixo and not request.GET.busca %}active{% endif %}">Todos</a>
                <a href="?eixo=1" class="nav-link-custom {% if request.GET.eixo == '1' %}active{% endif %}">Python</a>
                <a href="?busca=IA" class="nav-link-custom {% if request.GET.busca == 'IA' %}active{% endif %}">IA</a>
                <a href="?eixo=2" class="nav-link-custom {% if request.GET.eixo == '2' %}active{% endif %}">Bancos de Dados</a>
                <a href="?eixo=3" class="nav-link-custom {% if request.GET.eixo == '3' %}active{% endif %}">Dev Web</a>
            </div>
            
            <!-- Barra de Pesquisa (Direita) -->
            <form method="GET" action="{% url 'home' %}" class="nav-search-wrapper">
                <i class="bi bi-search nav-search-icon"></i>
                <input type="text" name="busca" class="nav-search-input" placeholder="Buscar..." value="{{ request.GET.busca }}">
                {% if request.GET.eixo %}
                    <input type="hidden" name="eixo" value="{{ request.GET.eixo }}">
                {% endif %}
            </form>
        </div>
    </nav>
    
    <main class="container my-5 flex-grow-1"> 
        {% block content %}
        {% endblock %}
    </main>

    <footer class="custom-footer mt-auto py-4">
        <div class="container text-center">
            <p class="mb-1 fw-bold text-white">Artigos Blog Django</p>
            <small style="color: var(--text-muted);">© 2026 - Todos os direitos reservados.</small>
        </div>
    </footer>

</body>
</html>
