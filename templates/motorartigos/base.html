{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Artigos Blog Django{% endblock %}</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        :root { --bg-darkest: #0b0f19; --bg-dark: #121824; --text-main: #ffffff; --primary-accent: #51649e; --border-color: #1e293b; }
        body { background-color: var(--bg-darkest); color: var(--text-main); font-family: 'Plus Jakarta Sans', sans-serif; }
        
        /* Estilos do Header incorporado */
        .custon-navbar { background-color: var(--bg-dark) !important; border-bottom: 1px solid var(--border-color); }
        .nav-link-custom { color: #b9babd !important; text-decoration: none; font-weight: 600; font-size: 0.9rem; padding: 0.25rem 0.75rem; border-radius: 6px; }
        .nav-link-custom:hover { color: #ffffff !important; background-color: rgba(255, 255, 255, 0.05); }
    </style>
</head>
<body>

    <!-- Header Incorporado para evitar erro de TemplateDoesNotExist -->
    <nav class="navbar custon-navbar py-3">
        <div class="container d-flex justify-content-between align-items-center">
            <a class="navbar-brand fw-bold fs-5 text-white text-decoration-none m-0" href="{% url 'home' %}">
                <i class="bi bi-terminal-fill me-2" style="color: var(--primary-accent);"></i> Artigos Blog <span style="color: var(--primary-accent);">Django</span>
            </a>
            <div class="d-flex align-items-center gap-3">
                <a href="/admin" class="nav-link-custom"><i class="bi bi-gear"></i> Painel Admin</a>
                <a href="{% url 'contato' %}" class="nav-link-custom"><i class="bi bi-question-circle"></i> Suporte</a>
            </div>
        </div>
    </nav>
    
    <main class="container my-5"> 
        {% block content %}{% endblock %}
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
